name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (gating)
        run: cargo test --all --locked

  build:
    name: build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release --locked
        run: cargo build --release --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check (advisories + licenses + bans + sources)
        run: |
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check bans
          cargo deny check sources

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install --locked cargo-machete
      - name: cargo machete (with-fix suggested)
        run: |
          echo "== run: cargo machete =="
          cargo machete --with-metadata || true
          echo "== done =="

  audit:
    name: RustSec audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit --features=fix
      - name: Audit (informational; gating done in `deny`)
        run: cargo audit
        continue-on-error: true

  docs-canonical:
    name: canonical docs (soft)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Assert BENCH-002 canonical docs exist
        run: |
          set -euo pipefail
          missing=0
          for f in \
            README.md \
            ARCHITECTURE.md \
            SSOT.md \
            SPEC.md \
            AGENTS.md \
            CLAUDE.md \
            CONTRIBUTING.md \
            CHANGELOG.md \
            LICENSE \
            SECURITY.md \
            docs/SCORECARD.md \
            audit_scorecard.json \
            trace-gate.toml
          do
            if [[ ! -f "$f" ]]; then
              echo "::warning::missing canonical doc: $f"
              missing=1
            else
              echo "ok: $f"
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Canonical docs soft gate: FAIL (see warnings)"
            exit 1
          fi
          echo "Canonical docs soft gate: PASS (BENCH-002)"

  docker-smoke:
    name: docker smoke (soft)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Local image build + CLI --help (no registry)
        run: |
          set -euo pipefail
          docker build -t benchora:ci .
          docker run --rm benchora:ci --help
          echo "Docker smoke soft gate: PASS (BENCH-004)"

  trace-gate:
    name: FR Coverage Gate
    uses: KooshaPari/phenotype-pm-core/.github/workflows/trace-gate.yml@master


